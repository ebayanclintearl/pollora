name: pollora_app
description: A dark-mode social polling app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^0.8.9
  flutter_riverpod: ^2.5.1
  share_plus: ^10.1.4

  # Supabase
  supabase_flutter: ^2.5.0

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3           # required by sign_in_with_apple nonce

  # Images
  cached_network_image: ^3.3.1
  path: ^1.9.0

  # Links & reviews
  url_launcher: ^6.3.0
  in_app_review: ^2.0.9

  # Config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# path_provider_foundation 2.6.0 uses package:objective_c native assets whose
# iOS loader path is broken on the current Flutter toolchain.
# See: https://github.com/flutter/flutter/issues/186794
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
